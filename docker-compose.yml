services:
  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /var/www/html
    volumes:
      - ./server:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./server:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  web:
    image: nginx:1.28-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./server:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  front:
    build:
      context: .
      dockerfile: docker/front/Dockerfile
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./client:/app
      - front-node-modules:/app/node_modules
    environment:
      VITE_DEV_API_PROXY: http://web
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5174:5174"
    depends_on:
      - web

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-running}
      MYSQL_USER: ${DB_USERNAME:-running}
      MYSQL_PASSWORD: ${DB_PASSWORD:-running}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT_FORWARD:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8026}:8025"

volumes:
  mysql-data:
    name: running_mysql-data
  front-node-modules:
    name: running_front-node-modules
