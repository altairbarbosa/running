services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.28-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-running}
      MYSQL_USER: ${DB_USERNAME:-running}
      MYSQL_PASSWORD: ${DB_PASSWORD:-running}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT_FORWARD:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  node:
    image: node:24-alpine
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /var/www/html
    command: sh -c "npm install && npm run build && rm -f public/hot && tail -f /dev/null"
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8026}:8025"

volumes:
  mysql-data:
    name: running_mysql-data
  node-modules:
    name: running_node-modules
